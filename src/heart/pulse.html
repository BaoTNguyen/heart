<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>heart pulse</title>
<style>
  :root {
    color-scheme: dark;
    --page: #0d0d0d; --surface: #1a1a19; --border: rgba(255,255,255,.10);
    --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781; --grid: #2c2c2a;
    --heart: #3987e5; --arteries: #199e70; --capillaries: #d55181;
    --agent: #c98500; --marrow: #9085e9;
    --good: #0ca30c; --warn: #fab219; --crit: #d03b3b;
  }
  @media (prefers-color-scheme: light) {
    :root {
      color-scheme: light;
      --page: #f9f9f7; --surface: #fcfcfb; --border: rgba(11,11,11,.10);
      --ink: #0b0b0b; --ink-2: #52514e; --muted: #898781; --grid: #e1e0d9;
      --heart: #2a78d6; --arteries: #1baf7a; --capillaries: #e87ba4;
      --agent: #eda100; --marrow: #4a3aa7;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--page); color: var(--ink);
         font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif; }
  header { display: flex; align-items: baseline; gap: 16px; padding: 14px 20px;
           border-bottom: 1px solid var(--grid); }
  header h1 { font-size: 16px; font-weight: 600; }
  header .win { margin-left: auto; display: flex; gap: 4px; }
  header .win button { background: none; border: 1px solid var(--border); color: var(--ink-2);
                       border-radius: 6px; padding: 2px 10px; cursor: pointer; font: inherit; }
  header .win button.on { color: var(--ink); border-color: var(--ink-2); font-weight: 600; }
  #health { font-size: 13px; color: var(--ink-2); }
  #health.bad { color: var(--crit); font-weight: 600; }
  main { display: grid; grid-template-columns: minmax(340px, 1fr) minmax(380px, 1.4fr);
         gap: 16px; padding: 16px 20px; max-width: 1500px; }
  section h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em;
               color: var(--muted); margin-bottom: 8px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
          padding: 10px 12px; margin-bottom: 8px; }
  .card .top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .card .id { font-family: ui-monospace, monospace; font-size: 12px; color: var(--ink-2); }
  .card .task { font-weight: 600; overflow-wrap: anywhere; }
  .status { font-size: 12px; font-weight: 600; }
  .status.pass { color: var(--good); } .status.fail, .status.crashed { color: var(--crit); }
  .status.running { color: var(--heart); }
  .chip { font-size: 11px; border: 1px solid var(--border); border-radius: 999px;
          padding: 0 8px; color: var(--ink-2); }
  .roles { margin-top: 6px; font-size: 12px; color: var(--ink-2); display: flex;
           gap: 10px; flex-wrap: wrap; }
  #tailbox { background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
             padding: 8px 0; max-height: 72vh; overflow-y: auto;
             font: 12px/1.6 ui-monospace, monospace; }
  #tail div { padding: 0 12px; white-space: nowrap; overflow-x: hidden;
              text-overflow: ellipsis; }
  #tail .src { display: inline-block; min-width: 84px; font-weight: 600; }
  #tail .ts { color: var(--muted); }
  #tail .kv { color: var(--ink-2); }
  #insights { grid-column: 1 / -1; }
  #insights pre { background: var(--surface); border: 1px solid var(--border);
                  border-radius: 10px; padding: 12px 14px; overflow-x: auto;
                  font: 12px/1.7 ui-monospace, monospace; color: var(--ink-2); }
  .empty { color: var(--muted); font-size: 13px; padding: 8px 2px; }
  .steer { margin-top: 6px; display: flex; gap: 6px; }
  .steer input { flex: 1; background: var(--page); border: 1px solid var(--border);
                 border-radius: 6px; color: var(--ink); padding: 3px 8px; font: inherit; }
  .steer button { background: none; border: 1px solid var(--border); color: var(--ink-2);
                  border-radius: 6px; padding: 3px 10px; cursor: pointer; font: inherit; }
  .card .id.clickable { cursor: pointer; text-decoration: underline; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex;
             align-items: center; justify-content: center; z-index: 50; }
  .overlay.hidden { display: none; }
  .overlay .panel { background: var(--surface); border: 1px solid var(--border);
                    border-radius: 10px; padding: 16px 20px; width: 900px; max-width: 92vw;
                    max-height: 88vh; overflow-y: auto; }
  .overlay .panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em;
                        color: var(--muted); margin: 14px 0 6px; }
  .overlay .panel pre { background: var(--page); border: 1px solid var(--border);
                         border-radius: 8px; padding: 10px; overflow-x: auto;
                         font: 12px/1.6 ui-monospace, monospace; white-space: pre-wrap;
                         max-height: 320px; overflow-y: auto; }
  .overlay #dd-close { float: right; background: none; border: none; color: var(--ink-2);
                        font-size: 20px; line-height: 1; cursor: pointer; }
  .overlay details { margin-top: 6px; }
  .overlay summary { cursor: pointer; color: var(--ink-2); font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>heart pulse</h1>
  <span id="health">connecting…</span>
  <span class="win" id="win"></span>
</header>
<main>
  <section>
    <h2>Episodes</h2>
    <div id="board"><div class="empty">no episodes in window</div></div>
  </section>
  <section>
    <h2>Event stream</h2>
    <div id="tailbox"><div id="tail"></div></div>
  </section>
  <section id="insights">
    <h2>Insights</h2>
    <pre id="insight-lines">…</pre>
  </section>
</main>
<div id="drilldown" class="overlay hidden">
  <div class="panel">
    <button id="dd-close" onclick="closeDrilldown()">×</button>
    <h2 id="dd-title"></h2>
    <h3>Timeline</h3>
    <pre id="dd-timeline"></pre>
    <h3>Diff</h3>
    <pre id="dd-diff"></pre>
    <h3>Logs</h3>
    <div id="dd-logs"></div>
  </div>
</div>
<script>
"use strict";
const SRC = { heart: "--heart", arteries: "--arteries", capillaries: "--capillaries",
              agent: "--agent", marrow: "--marrow" };
const $ = id => document.getElementById(id);
let hours = 6, es = null;
const eps = new Map();          // episode_id -> state built from events

function short(v) { const s = String(v); return s.length > 60 ? s.slice(0, 57) + "…" : s; }
const ESC_MAP = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" };
function esc(v) { return String(v).replace(/[&<>"']/g, c => ESC_MAP[c]); }

function fold(e) {              // fold one spine event into episode state
  const id = e.episode_id;
  if (!id) return;
  const ep = eps.get(id) || { id, ts: e.ts, roles: [], status: "running",
                              tier: null, task: null, verify: [] };
  ep.task = ep.task || e.task_id;
  if (e.kind === "route.decided") ep.tier = (e.payload || {}).tier;
  if (e.kind === "role.finished")
    ep.roles.push({ role: e.role, ms: e.duration_ms, exit: (e.payload || {}).exit_code });
  if (e.kind === "verify.round") ep.verify.push((e.payload || {}).passed);
  if (e.kind === "episode.finished") {
    const p = e.payload || {};
    ep.status = p.outcome || "done"; ep.reward = p.reward; ep.verdict = p.review_verdict;
    ep.cost = p.cost_usd;
  }
  if (e.kind === "episode.failed") ep.status = "crashed";
  ep.last = e.ts;
  eps.set(id, ep);
}

function renderBoard() {
  const items = [...eps.values()].sort((a, b) => (b.ts || "").localeCompare(a.ts || ""));
  if (!items.length) { $("board").innerHTML = '<div class="empty">no episodes in window</div>'; return; }
  $("board").innerHTML = items.slice(0, 40).map(ep => {
    const mark = { pass: "✓ pass", fail: "✗ fail", crashed: "✗ crashed" }[ep.status]
                 || "● running";
    const verify = ep.verify.length
      ? `<span>verify ${ep.verify.map(p => p ? "✓" : "✗").join("")}</span>` : "";
    const roles = ep.roles.map(r =>
      `<span>${esc(r.role)} ${(r.ms / 1000).toFixed(0)}s${r.exit ? " ✗" : ""}</span>`).join("");
    const steerBox = ep.status === "running" ? `
      <div class="steer">
        <input type="text" placeholder="steer note…" data-ep="${esc(ep.id)}"
               onkeydown="if(event.key==='Enter')sendSteer(this.nextElementSibling)">
        <button onclick="sendSteer(this)">Send</button>
      </div>` : "";
    return `<div class="card">
      <div class="top">
        <span class="status ${ep.status}">${mark}</span>
        <span class="task">${esc(short(ep.task || "?"))}</span>
        ${ep.tier ? `<span class="chip">${esc(ep.tier)}</span>` : ""}
        ${ep.verdict ? `<span class="chip">review: ${esc(ep.verdict)}</span>` : ""}
        ${ep.reward != null ? `<span class="chip">r=${Number(ep.reward).toFixed(2)}</span>` : ""}
        ${ep.cost != null ? `<span class="chip">$${Number(ep.cost).toFixed(2)}</span>` : ""}
        <span class="id clickable" onclick="openDrilldown('${esc(ep.id)}')">${esc(ep.id)}</span>
      </div>
      ${roles || verify ? `<div class="roles">${roles}${verify}</div>` : ""}
      ${steerBox}
    </div>`;
  }).join("");
}

async function sendSteer(btn) {
  const input = btn.previousElementSibling;
  const text = input.value;
  if (!text.trim()) return;
  try {
    const r = await fetch(`/api/steer?episode=${encodeURIComponent(input.dataset.ep)}`,
                           { method: "POST", body: text });
    if (r.ok) input.value = "";
  } catch { /* best effort; operator can retry */ }
}

async function openDrilldown(id) {
  $("dd-title").textContent = id;
  $("dd-timeline").textContent = "loading…";
  $("dd-diff").textContent = "";
  $("dd-logs").innerHTML = "";
  $("drilldown").classList.remove("hidden");
  try {
    const r = await (await fetch(`/api/episode?id=${encodeURIComponent(id)}`)).json();
    $("dd-timeline").textContent = (r.timeline || []).join("\n");
    $("dd-diff").textContent = r.diff || "(no diff)";
    $("dd-logs").innerHTML = Object.entries(r.logs || {}).map(([role, text]) =>
      `<details><summary>${esc(role)}</summary><pre>${esc(text)}</pre></details>`).join("")
      || '<div class="empty">no logs</div>';
  } catch {
    $("dd-timeline").textContent = "failed to load";
  }
}
function closeDrilldown() { $("drilldown").classList.add("hidden"); }

function renderTail(e) {
  const box = $("tailbox"), stick = box.scrollTop + box.clientHeight >= box.scrollHeight - 8;
  const div = document.createElement("div");
  const color = `var(${SRC[e.source] || "--muted"})`;
  const kv = Object.entries(e.payload || {}).map(([k, v]) => `${esc(k)}=${esc(short(v))}`).join("  ");
  div.innerHTML = `<span class="ts">${esc((e.ts || "").slice(11, 19))}</span>  ` +
    `<span class="src" style="color:${color}">${esc(e.source || "?")}</span>` +
    `${esc(e.kind || "?")}${e.role ? " role=" + esc(e.role) : ""}  <span class="kv">${kv}</span>`;
  const tail = $("tail");
  tail.appendChild(div);
  while (tail.childElementCount > 400) tail.firstElementChild.remove();
  if (stick) box.scrollTop = box.scrollHeight;
}

let pending = false;
function connect() {
  if (es) es.close();
  eps.clear(); $("tail").innerHTML = "";
  es = new EventSource(`/stream?hours=${hours}`);
  es.onmessage = m => {
    const e = JSON.parse(m.data);
    fold(e); renderTail(e);
    if (!pending) { pending = true; requestAnimationFrame(() => { pending = false; renderBoard(); }); }
  };
  es.onerror = () => { $("health").textContent = "disconnected — retrying"; $("health").className = "bad"; };
  es.onopen = refreshInsights;
}

async function refreshInsights() {
  try {
    const r = await (await fetch(`/api/insights?hours=${hours}`)).json();
    $("insight-lines").textContent = r.insights.join("\n");
    $("health").textContent = r.health.lines[0];
    $("health").className = r.health.code ? "bad" : "";
  } catch { /* server going away; SSE error path reports it */ }
}

for (const h of [1, 6, 24]) {
  const b = document.createElement("button");
  b.textContent = h + "h";
  b.onclick = () => { hours = h; sync(); connect(); };
  $("win").appendChild(b);
}
function sync() {
  [...$("win").children].forEach(b => b.classList.toggle("on", b.textContent === hours + "h"));
}
sync(); connect();
setInterval(refreshInsights, 30000);
</script>
</body>
</html>
